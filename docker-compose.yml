version: '3'
services:
  iptv-api:
    build: .
    ports:
      - "5180:5180"   # Flask API
      - "8080:8080"   # Nginx HTTP
      - "1935:1935"   # RTMP
    environment:
      - OPEN_RTMP=true
      - APP_PORT=5180
      - NGINX_HTTP_PORT=8080
      - NGINX_RTMP_PORT=1935
      - AUTONOMOUS_MODE=true
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config:/app/config
    restart: unless-stopped
