# docker-compose.yml
version: '3'

services:
  iptv:
    build: .
    container_name: iptv-collector
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config:/app/config
    environment:
      - AUTONOMOUS_MODE=true
      - MAX_WORKERS=20
      - TIMEOUT=8
      - FFMPEG_ENABLE=true
    restart: unless-stopped
