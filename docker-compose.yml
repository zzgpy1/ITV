services:
  iptv-collector:
    build: .
    container_name: iptv-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./alias.txt:/app/alias.txt:ro
      - ./blacklist.txt:/app/blacklist.txt:ro
      - ./demo.txt:/app/demo.txt:ro
    environment:
      - MAX_WORKERS=10
      - TIMEOUT=10
      - FFMPEG_ENABLE=true
      - ENABLE_RETRY=true
      - ENABLE_IP_RESOLVE=false
      - ENABLE_REGION_FILTER=false
      - CACHE_SPEED_HOURS=24
      - CACHE_RAW_HOURS=24
      - MAX_SOURCES_PER_CHANNEL=5
      - DEMO_MATCH_MODE=contains
      - RUN_MODE=schedule
      - SCHEDULE_INTERVAL=21600
      # 卡顿优化配置
      - MIN_LATENCY_THRESHOLD=3000      # 过滤延迟超过 3 秒的源
      - KEEP_BEST_SOURCES=3             # 每个频道保留 3 个最佳源
      - SORT_M3U_BY_LATENCY=true        # M3U 按延迟排序
      - ENABLE_MULTI_SOURCE=true        # 启用多源备用
