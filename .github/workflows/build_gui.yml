name: Build GUI Exe and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get PyQt5 Path
        id: pyqt5_path
        run: |
          $pyqt_path = python -c "import PyQt5; print(PyQt5.__path__[0])"
          echo "PYQT5_PATH=$pyqt_path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Prepare GUI directories
        run: |
          New-Item -ItemType Directory -Force -Path gui/resources
          New-Item -ItemType Directory -Force -Path gui/styles
          if (-not (Test-Path gui/resources/__init__.py)) {
            "# placeholder" | Out-File -FilePath gui/resources/__init__.py -Encoding utf8
          }
          if (-not (Test-Path gui/styles/dark_theme.qss)) {
            "/* placeholder */" | Out-File -FilePath gui/styles/dark_theme.qss -Encoding utf8
          }

      - name: Build with PyInstaller (onedir + add-binary)
        run: |
          pyinstaller --clean --onedir --windowed `
            --add-data "gui/styles;styles" `
            --add-data "gui/resources;resources" `
            --add-binary "$env:PYQT5_PATH;PyQt5" `
            --collect-all PyQt5 `
            --collect-all PyQt5.sip `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import sip `
            --collect-all src `
            --name "IPTV_Collector" `
            gui/main.py

      - name: Compress output folder to zip
        run: |
          Compress-Archive -Path dist/IPTV_Collector/* -DestinationPath dist/IPTV_Collector_Windows_x64.zip -Force

      - name: Upload zip to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/IPTV_Collector_Windows_x64.zip
          asset_name: IPTV_Collector_Windows_x64.zip
          tag: ${{ github.ref_name }}
          overwrite: true
