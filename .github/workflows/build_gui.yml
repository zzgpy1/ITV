name: Build GUI Exe and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir PyQt5
          pip install --no-cache-dir pyinstaller
          pip install -r requirements.txt

      - name: Verify PyQt5 installed
        run: |
          python -c "import PyQt5; print('PyQt5 installed')"

      - name: Ensure gui/__init__.py is correct (do not delete gui folder)
        run: |
          # 仅覆盖 __init__.py 文件，确保内容为有效 Python
          Set-Content -Path gui/__init__.py -Value "# gui package"
          Set-Content -Path gui/resources/__init__.py -Value "# placeholder"
          Set-Content -Path gui/styles/dark_theme.qss -Value "/* placeholder */"

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --clean --onedir --windowed `
            --add-data "gui;gui" `
            --add-data "gui/styles;styles" `
            --add-data "gui/resources;resources" `
            --collect-all PyQt5 `
            --collect-all src `
            --collect-all gui `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import src `
            --name "IPTV_Collector" `
            gui/main.py

      - name: Copy config files to output folder
        run: |
          # 将根目录的配置文件复制到 exe 所在目录，方便用户使用
          Copy-Item -Path demo.txt -Destination dist/IPTV_Collector/ -ErrorAction SilentlyContinue
          Copy-Item -Path alias.txt -Destination dist/IPTV_Collector/ -ErrorAction SilentlyContinue
          Copy-Item -Path blacklist.txt -Destination dist/IPTV_Collector/ -ErrorAction SilentlyContinue

      - name: Compress output folder to zip
        run: |
          Compress-Archive -Path dist/IPTV_Collector/* -DestinationPath dist/IPTV_Collector_Windows_x64.zip -Force

      - name: Upload zip to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/IPTV_Collector_Windows_x64.zip
          asset_name: IPTV_Collector_Windows_x64.zip
          tag: ${{ github.ref_name }}
          overwrite: true
