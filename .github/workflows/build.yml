name: 构建 GUI 工具并发布到 Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 创建资源目录
      run: |
        mkdir resources -Force
        echo "No icon" > resources/placeholder.txt
    
    - name: 打包成 exe
      run: |
        pyinstaller build.spec --clean --noconfirm
    
    - name: 创建发布包（包含 src 目录）
      run: |
        mkdir dist_package
        # 复制 exe
        copy dist\IPTV_Manager.exe dist_package\
        # 复制整个 src 目录（已经包含所有模块）
        xcopy src dist_package\src\ /E /I /Y
        # 复制其他必需文件
        xcopy alias.txt dist_package\ /Y
        xcopy blacklist.txt dist_package\ /Y
        xcopy demo.txt dist_package\ /Y
        xcopy resources dist_package\resources\ /E /I /Y
        mkdir dist_package\output
        mkdir dist_package\data
        echo 使用说明 > dist_package\使用说明.txt
        echo 1. 双击 IPTV_Manager.exe 启动工具 >> dist_package\使用说明.txt
        echo 2. 点击"启动采集"开始获取直播源 >> dist_package\使用说明.txt
        echo 3. 采集完成后在 output 目录查看结果 >> dist_package\使用说明.txt
        echo. >> dist_package\使用说明.txt
        echo 注意：src 目录为程序核心代码，请勿删除或移动。 >> dist_package\使用说明.txt
    
    - name: 打包为 ZIP
      run: |
        powershell Compress-Archive -Path dist_package\* -DestinationPath IPTV_Manager_Windows.zip
    
    - name: 创建 Release 并上传
      uses: softprops/action-gh-release@v1
      with:
        files: IPTV_Manager_Windows.zip
        tag_name: ${{ github.ref_name }}
        name: "IPTV 智能管理工具 ${{ github.ref_name }}"
        body: |
          ## IPTV 智能管理工具 ${{ github.ref_name }}
          
          ### 功能
          - 多源自动采集
          - HTTP 测速 + ffmpeg 深度验证
          - 智能分类（央视/卫视/地方/港澳台）
          - 固定源管理
          - 质量趋势监控
          
          ### 使用说明
          1. 下载并解压 `IPTV_Manager_Windows.zip`
          2. 双击 `IPTV_Manager.exe` 启动工具
          3. 点击"启动采集"开始获取直播源
          4. 采集完成后在 `output` 目录查看 `tv.m3u` 和 `tv.txt`
          
          ### 系统要求
          - Windows 10/11 或 Windows Server 2019+
        draft: false
        prerelease: false
