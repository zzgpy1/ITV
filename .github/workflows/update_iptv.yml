name: "IPTV 源智能更新与整理"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（main分支）
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 缓存 IPTV 数据库
        uses: actions/cache@v4
        with:
          path: iptv_cache.db
          key: ${{ runner.os }}-iptv-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      # 强制删除旧缓存，确保别名修正后重新采集
      - name: 删除旧缓存（确保别名生效）
        run: |
          if [ -f "iptv_cache.db" ]; then
            echo "删除旧缓存文件 iptv_cache.db"
            rm -f iptv_cache.db
          else
            echo "无缓存文件，跳过删除"
          fi

      - name: 安装 ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 缓存 IP 数据库
        uses: actions/cache@v4
        with:
          path: qqwry.dat
          key: ${{ runner.os }}-qqwry-dat
          restore-keys: |
            ${{ runner.os }}-qqwry-dat

      - name: 更新 IP 数据库
        run: python -m src.update_ipdb
        continue-on-error: true

      - name: 执行 IPTV 更新脚本
        run: python -m src.run
        env:
          MAX_WORKERS: 10
          TIMEOUT: 10
          FFMPEG_ENABLE: true
          ENABLE_RETRY: true
          ENABLE_IP_RESOLVE: true
          ENABLE_REGION_FILTER: false
          PREFERRED_LOCATION: ""
          PREFERRED_ISP: ""

      - name: 部署 output 目录到 main 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main               # 目标分支
          folder: output             # 要部署的文件夹
          target-folder: output      # 目标子目录
          clean: false               # 不清除目标分支的其他文件
