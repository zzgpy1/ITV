name: IPTV 源智能更新与整理

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    concurrency:
      group: iptv-update
      cancel-in-progress: false

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Git 配置
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: 删除冲突的 main 标签
      run: |
        if git tag | grep -q "^main$"; then
          echo "发现冲突的 'main' 标签，正在删除..."
          git tag -d main
          echo "✅ 冲突标签已删除。"
        else
          echo "✅ 未发现冲突的 'main' 标签。"
        fi

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 运行采集程序
      run: python -m src.run
      env:
        MAX_WORKERS: 20
        TIMEOUT: 8
        FFMPEG_ENABLE: true
        CACHE_HOURS: 24
        ENABLE_DEMO_FILTER: true
        ENABLE_ALIAS: true
        ENABLE_BLACKLIST: true
        DATABASE_ENABLE: true
        RUN_MODE: once
        IPTV_ORG_ENABLE: true
        ENABLE_GLOBAL_CHANNELS: false
        ENABLE_JSON_OUTPUT: true
        ENABLE_LITE_VERSION: false
        ENABLE_EPG_OUTPUT: false
        AUTONOMOUS_MODE: true
        AUTO_UPDATE_STABLE: true
        AUTO_REPLACE_FAILED: true
        QUALITY_CHECK_INTERVAL: 24
        CANDIDATE_OBSERVATION_HOURS: 24
        CANDIDATE_MIN_SUCCESS: 3
        CANDIDATE_MIN_SUCCESS_RATE: 0.5
        CANDIDATE_MAX_LATENCY: 3000

    - name: 准备提交（忽略动态文件的冲突）
      run: |
        # 从索引中移除动态文件（但保留本地工作区）
        git rm -r --cached data/ 2>/dev/null || true
        git rm --cached iptv_cache.db 2>/dev/null || true
        git rm -r --cached output/ 2>/dev/null || true
        git rm -r --cached */__pycache__/ 2>/dev/null || true
        git rm -r --cached src/__pycache__/ 2>/dev/null || true

    - name: 提交并推送更改到 main 分支
      run: |
        echo "🔄 拉取远程最新更改..."
        git pull origin main --rebase --autostash || echo "拉取失败或无更新，继续..."
        
        echo "📝 检查并添加更改（仅添加必要的文件）..."
        # 只添加源码文件和配置文件
        git add src/*.py
        git add src/*/*.py
        git add alias.txt blacklist.txt demo.txt
        git add .gitignore
        git add requirements.txt Dockerfile docker-compose.yml entrypoint.sh
        
        if git diff --cached --quiet; then
          echo "✅ 没有检测到新更改（源码部分）"
          exit 0
        fi
        
        echo "📦 提交更改..."
        git commit -m "自动更新 IPTV 列表 - $(date '+%Y-%m-%d %H:%M:%S')"
        
        echo "🚀 推送到 main 分支（带重试）..."
        for i in 1 2 3; do
          echo "尝试第 $i 次推送..."
          if git push origin main; then
            echo "✅ 推送成功"
            exit 0
          else
            echo "⚠️ 推送失败，拉取最新更改后重试..."
            git pull origin main --rebase --autostash
            sleep 2
          fi
        done
        
        echo "⚠️ 重试后仍失败，尝试安全强制推送..."
        git push --force-with-lease origin main
        echo "✅ 安全强制推送成功"

    - name: 上传输出文件作为 artifacts（可选）
      uses: actions/upload-artifact@v4
      with:
        name: iptv-output
        path: |
          output/*.m3u
          output/*.txt
          output/*.json
          output/*.log
        retention-days: 7
