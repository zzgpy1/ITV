name: "IPTV 源智能更新与整理"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iptv-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（main分支）
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 缓存 IPTV 数据库
        uses: actions/cache@v4
        with:
          path: iptv_cache.db
          key: ${{ runner.os }}-iptv-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-iptv-cache-

      - name: 安装 ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 缓存 IP 数据库
        uses: actions/cache@v4
        with:
          path: qqwry.dat
          key: ${{ runner.os }}-qqwry-dat
          restore-keys: |
            ${{ runner.os }}-qqwry-dat

      - name: 更新 IP 数据库
        run: python -m src.update_ipdb
        continue-on-error: true

      - name: 执行 IPTV 更新脚本
        run: python -m src.run
        env:
          MAX_WORKERS: 10
          TIMEOUT: 10
          FFMPEG_ENABLE: true
          ENABLE_RETRY: true
          ENABLE_IP_RESOLVE: true
          ENABLE_REGION_FILTER: false
          PREFERRED_LOCATION: ""
          PREFERRED_ISP: ""
          CACHE_SPEED_HOURS: 24
          CACHE_RAW_HOURS: 24
          MAX_SOURCES_PER_CHANNEL: 5
          DEMO_MATCH_MODE: contains

      - name: 部署 output 目录到 main 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: output
          target-folder: output
          clean: false
