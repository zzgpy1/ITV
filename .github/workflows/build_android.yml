name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'output/tv.m3u'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          cd android
          # 动态生成 M3U_URL
          M3U_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/tv.m3u"
          echo "Using M3U_URL: $M3U_URL"
          # 通过 gradle 属性传递
          gradle assembleRelease -PM3U_URL="$M3U_URL"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player
          path: android/app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-latest
          name: "IPTV Player APK"
          body: "自动构建于 ${{ github.run_id }}\nM3U地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/tv.m3u"
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
