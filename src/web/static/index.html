<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV 智能管理面板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3 border-bottom border-secondary">
                        <i class="fas fa-satellite-dish me-2"></i>IPTV 管理
                    </h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#" data-page="dashboard"><i class="fas fa-tachometer-alt me-2"></i>仪表盘</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="channels"><i class="fas fa-list me-2"></i>频道列表</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="fixed"><i class="fas fa-thumbtack me-2"></i>固定源管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="config"><i class="fas fa-cog me-2"></i>配置管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" data-page="quality"><i class="fas fa-chart-line me-2"></i>质量趋势</a></li>
                    </ul>
                    <hr class="border-secondary">
                    <div class="text-center text-muted small"><span id="last-update">更新于: --</span></div>
                </div>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2" id="page-title">仪表盘</h1>
                    <button class="btn btn-sm btn-outline-secondary" id="refresh-btn"><i class="fas fa-sync-alt me-1"></i>刷新</button>
                </div>
                <div id="page-content"></div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
